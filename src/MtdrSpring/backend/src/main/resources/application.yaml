#Application properties (BASE)
spring:
  jpa:
    database-platform: org.hibernate.community.dialect.Oracle12cDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    type: oracle.ucp.jdbc.PoolDataSource

    # This is not used when deployed in Kubernetes. Just for local testing
    # url: jdbc:oracle:thin:@adbps_medium?TNS_ADMIN=/Users/psong/Downloads/Wallet_ADBPS
    # username: admin
    # password: WELcome__12345

    oracleucp:
      connection-factory-class-name: oracle.jdbc.pool.OracleDataSource
      sql-for-validate-connection: "select * from dual"
      connection-pool-name: connectionPoolName1
      initial-pool-size: 15
      min-pool-size: 10
      max-pool-size: 30

logging:
  level:
    root: trace
    oracle:
      ucp: trace
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
          TRACE: TRACE
  file:
    name: logs.log

deepseek:
  api:
    key: sk-test
    url: https://api.deepseek.com/v1/chat/completions
