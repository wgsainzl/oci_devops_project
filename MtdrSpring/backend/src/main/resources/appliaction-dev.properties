spring:
  datasource:
    url: jdbc:h2:mem:todo_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    type: com.zaxxer.hikari.HikariDataSource # Overrides the Oracle UCP from base yaml
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console